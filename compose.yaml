services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: embedding-api
    ports:
      - "${API_PORT:-8080}:${API_PORT:-8080}"
    env_file:
      - .env
    volumes:
      - embedding-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:${POSTGRES_VERSION:-18.3}
    container_name: embedding-postgres
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-embedding}"]
      interval: 5s
      timeout: 10s
      retries: 5

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
      args:
        BNB_BUILD_FROM_SOURCE: "${BNB_BUILD_FROM_SOURCE:-0}"
        BNB_GIT_REF: "${BNB_GIT_REF:-0.49.2}"
        BNB_ROCM_ARCH: "${BNB_ROCM_ARCH:-gfx1030}"
    container_name: embedding-worker
    environment:
      HSA_OVERRIDE_GFX_VERSION: "${HSA_OVERRIDE_GFX_VERSION:-10.3.0}"
      XDG_CACHE_HOME: /cache
      HF_HOME: /cache/huggingface
      HF_HUB_CACHE: /cache/huggingface/hub
      TORCH_HOME: /cache/torch
      HF_HUB_DISABLE_XET: "1"
      HF_XET_DISABLE: "1"
    env_file:
      - .env
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
      - render
    ipc: host
    shm_size: 8gb
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    volumes:
      - embedding-data:/data
      - worker-cache:/cache

volumes:
  embedding-data:
  postgres-data:
  worker-cache:
