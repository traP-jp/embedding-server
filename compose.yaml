services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: embedding-api
    ports:
      - "${API_PORT:-8080}:${API_PORT:-8080}"
    environment:
      API_PORT: ${API_PORT:-8080}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-embedding}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-disable}
    volumes:
      - embedding-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:${POSTGRES_VERSION:-18.3}
    container_name: embedding-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-embedding}
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-embedding}"]
      interval: 5s
      timeout: 10s
      retries: 5

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: embedding-worker
    environment:
      API_PORT: ${API_PORT:-8080}
      ATTN_IMPLEMENTATION: ${ATTN_IMPLEMENTATION:-sdpa}
      EMBED_BATCH_SIZE: ${EMBED_BATCH_SIZE:-1}
      MODEL_NAME: ${MODEL_NAME:-Qwen/Qwen3-VL-Embedding-8B}
      OCR_DEVICE: ${OCR_DEVICE:-cuda}
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
      - render
    ipc: host
    shm_size: 8gb
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    volumes:
      - embedding-data:/data

volumes:
  embedding-data:
  postgres-data:
