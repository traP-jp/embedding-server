services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: embedding-api
    ports:
      - "${API_PORT:-8080}:${API_PORT:-8080}"
    environment:
      SQLITE_PATH: ${SQLITE_PATH:-/data/embedding.db}
      PORT: ${API_PORT:-8080}
    volumes:
      - embedding-data:/data
    restart: unless-stopped

