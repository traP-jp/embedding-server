services:
  api:
    build:
      context: ../server
      dockerfile: ../development/Dockerfile
    container_name: embedding-api-dev
    working_dir: /app/server
    ports:
      - "${API_PORT:-8080}:${API_PORT:-8080}"
    environment:
      PORT: ${API_PORT:-8080}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-embedding}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-disable}
    volumes:
      - "../server:/app/server"
      - go-build-cache:/root/.cache/go-build
      - go-mod-cache:/go/pkg/mod
      - embedding-data:/data
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:${POSTGRES_VERSION:-18.3}
    container_name: embedding-postgres-dev
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-embedding}
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-embedding}"]
      interval: 1s
      timeout: 10s
      retries: 60

volumes:
  embedding-data:
  postgres-data:
  go-build-cache:
  go-mod-cache:
