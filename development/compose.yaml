services:
  api:
    build:
      context: ../server
      dockerfile: ../development/Dockerfile
    container_name: embedding-api-dev
    working_dir: /app/server
    ports:
      - "${API_PORT:-8080}:${API_PORT:-8080}"
    environment:
      SQLITE_PATH: ${SQLITE_PATH:-/data/embedding.db}
      PORT: ${API_PORT:-8080}
    volumes:
      - "../server:/app/server"
      - go-build-cache:/root/.cache/go-build
      - go-mod-cache:/go/pkg/mod
      - embedding-data:/data

volumes:
  embedding-data:
  go-build-cache:
  go-mod-cache:
